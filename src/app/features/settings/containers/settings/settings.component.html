<div class="min-h-screen bg-background text-foreground transition-colors duration-300">
  <div class="pt-20 pb-8">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      
      <!-- Cabeçalho das Configurações -->
      <div class="mb-8 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <div>
          <h1 class="text-3xl font-bold tracking-tight">Configurações</h1>
          <p class="text-muted-foreground mt-2 text-sm">
            Gerencie sua conta, avatar e segurança
          </p>
        </div>
        <a routerLink="/editor" class="inline-flex items-center gap-2 px-4 h-10 rounded-full border border-border bg-card hover:bg-primary/10 text-xs font-semibold shadow-md transition-colors cursor-pointer self-start sm:self-center">
          <i class="pi pi-arrow-left"></i>
          <span>Voltar ao Editor</span>
        </a>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-fade-in">
        
        <!-- Cartão Esquerdo: Avatar -->
        <div class="bg-card rounded-2xl border border-border/60 p-6 flex flex-col items-center text-center shadow-sm">
          <div class="relative group cursor-pointer" (click)="triggerFileInput()">
            <!-- Imagem ou Iniciais -->
            <div class="h-28 w-28 rounded-full border-2 border-border/80 overflow-hidden flex items-center justify-center bg-background transition-colors group-hover:border-primary/40">
              @if (authService.currentUser()?.profileImageUrl) {
                <img
                  [src]="authService.currentUser()?.profileImageUrl"
                  alt="Avatar do usuário"
                  class="h-full w-full object-cover"
                />
              } @else {
                <span class="text-3xl font-bold text-primary">
                  {{ userInitial() }}
                </span>
              }
            </div>

            <!-- Overlay de Hover -->
            <div class="absolute inset-0 bg-black/40 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center text-white transition-opacity duration-200">
              <i class="pi pi-camera text-xl"></i>
            </div>

            <!-- Spinner de Uploading -->
            @if (isUploadingAvatar()) {
              <div class="absolute inset-0 bg-black/60 rounded-full flex items-center justify-center text-white">
                <i class="pi pi-spin pi-spinner text-xl"></i>
              </div>
            }
          </div>

          <input
            #fileInput
            type="file"
            accept="image/*"
            class="hidden"
            (change)="onFileSelected($event)"
          />

          <h3 class="font-bold text-base mt-4">{{ authService.currentUser()?.username }}</h3>
          <p class="text-xs text-muted-foreground mt-1 font-light">{{ authService.currentUser()?.email }}</p>

          <button
            type="button"
            (click)="triggerFileInput()"
            class="mt-4 text-xs font-semibold text-primary hover:underline cursor-pointer"
          >
            Alterar foto de perfil
          </button>
        </div>

        <!-- Formulários da Direita -->
        <div class="md:col-span-2 space-y-6">
          <div class="bg-card rounded-2xl border border-border/60 p-6 shadow-sm">
            <!-- Profile Form (Dumb Component) -->
            <app-profile-form
              [currentUser]="authService.currentUser()"
              [isUpdatingProfile]="isUpdatingProfile()"
              [successMessage]="credentialsSuccess()"
              [errorMessage]="credentialsError()"
              (submitForm)="handleSubmitCredentials($event)"
            ></app-profile-form>
          </div>

          <div class="bg-card rounded-2xl border border-border/60 p-6 shadow-sm">
            <!-- Password Form (Dumb Component) -->
            <app-password-form
              #passwordFormRef
              [isChangingPassword]="isChangingPassword()"
              [successMessage]="passwordSuccess()"
              [errorMessage]="passwordError()"
              (submitForm)="handleSubmitPassword($event)"
            ></app-password-form>
          </div>
        </div>

      </div>

      <!-- Avatar Crop Modal (Dumb Component) -->
      <app-avatar-crop-modal
        [isOpen]="isCropModalOpen()"
        [imageChangedEvent]="imageChangedEvent"
        [isUploading]="isUploadingAvatar()"
        (close)="handleCloseCropModal()"
        (upload)="handleUploadAvatar($event)"
      ></app-avatar-crop-modal>

    </div>
  </div>
</div>
